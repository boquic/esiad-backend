# Reverse proxy + servidor de la SPA Angular (SIGEPED)
# Unifica origen: el navegador solo habla con :8080, así NO hay CORS.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Límite de subida coherente con UPLOAD_MAX_SIZE_MB del backend.
    client_max_body_size 25m;

    # API hacia el backend (resuelto por nombre de servicio en la red de Compose).
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Healthcheck del backend a través del proxy.
    location /health {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }

    # Rutas del SPA: cualquier ruta desconocida devuelve index.html (Angular Router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
