# Compose de integración Backend + Frontend (SIGEPED)
# Asume los dos repos clonados lado a lado:
#   sigeped/
#   ├── esiad-backend/   (este repo)
#   ├── esiad-frontend/  (Angular + nginx)
#   └── deploy/          (este archivo)
#
# Uso:
#   cp .env.deploy.example .env.deploy   # ajustar secretos
#   docker compose up --build
#   abrir http://localhost:8080

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env.deploy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sigeped}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sigeped}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Aplica migraciones y termina (exit 0) antes de que arranque el backend.
  migrate:
    build:
      context: ../esiad-backend
    image: esiad-backend
    env_file:
      - .env.deploy
    command: ["npm", "run", "db:migrate:deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # API. No se expone al host: solo es accesible por nginx en la red interna.
  backend:
    build:
      context: ../esiad-backend
    image: esiad-backend
    restart: unless-stopped
    env_file:
      - .env.deploy
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # nginx: sirve el build de Angular y hace proxy de /api y /health al backend.
  frontend:
    build:
      context: ../esiad-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # Config de proxy versionada junto al compose (sobreescribe la default).
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
